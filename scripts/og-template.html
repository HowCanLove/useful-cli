<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>OG image</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: linear-gradient(135deg, #10b981 0%, #064e3b 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "JetBrains Mono", monospace, sans-serif;
    color: white;
    position: relative;
  }
  body::before {
    content: ""; position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.18), transparent 45%),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,0.15), transparent 45%);
  }
  .badge { position:absolute; top:60px; left:70px; padding:6px 16px; background:rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.4); border-radius:999px; font-size:18px; font-weight:500; font-family: ui-monospace, "JetBrains Mono", monospace; }
  h1 { position:absolute; top:130px; left:70px; font-size:78px; font-weight:800; letter-spacing:-2px; line-height:1; }
  h1 .emoji { font-size:70px; margin-right:10px; vertical-align:-4px; }
  .tagline { position:absolute; top:240px; left:70px; font-size:26px; font-weight:400; opacity:0.95; line-height:1.4; max-width:1060px; font-family: ui-monospace, "JetBrains Mono", monospace; }
  .features { position:absolute; top:380px; left:70px; display:flex; gap:12px; flex-wrap:nowrap; }
  .feature { padding:8px 18px; background:rgba(0,0,0,0.4); border-radius:6px; font-size:18px; font-weight:500; white-space:nowrap; font-family: ui-monospace, "JetBrains Mono", monospace; }
  .stats { position:absolute; bottom:60px; left:70px; display:flex; gap:32px; }
  .stat-num { font-size:44px; font-weight:800; line-height:1; letter-spacing:-1px; }
  .stat-lbl { font-size:16px; opacity:0.85; margin-top:4px; }
  .url { position:absolute; bottom:60px; right:70px; font-size:22px; font-weight:600; text-align:right; font-family: ui-monospace, "JetBrains Mono", monospace; }
  .url small { display:block; font-size:15px; opacity:0.8; margin-top:4px; font-weight:400; }
</style>
</head>
<body>
  <span class="badge">$ ls /usr/local/bin/</span>
  <h1><span class="emoji">💻</span>终端神器</h1>
  <p class="tagline">现代 CLI / TUI 工具集合<br>替代经典 Unix 命令的 Rust / Go 新一代</p>
  <div class="features">
    <span class="feature">bat</span>
    <span class="feature">ripgrep</span>
    <span class="feature">fzf</span>
    <span class="feature">lazygit</span>
    <span class="feature">starship</span>
  </div>
  <div class="stats">
    <div><div class="stat-num">33</div><div class="stat-lbl">工具</div></div>
    <div><div class="stat-num">9</div><div class="stat-lbl">分类</div></div>
    <div><div class="stat-num">3</div><div class="stat-lbl">语言</div></div>
  </div>
  <div class="url">
    cli.512347.xyz
    <small>github.com/HowCanLove/useful-cli</small>
  </div>
</body>
</html>
